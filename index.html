<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Quest — Tu viaje al inglés</title>
  <meta name="description" content="Aprende inglés jugando: viaja por destinos, gana XP y colecciona sellos en tu pasaporte." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ============ PANTALLA DE BIENVENIDA / IDIOMA ============ -->
  <section id="screen-welcome" class="screen active">
    <div class="sky">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
      <div class="plane">✈️</div>
    </div>
    <header class="home-header">
      <h1>English<span class="accent">Quest</span></h1>
    </header>
    <div class="welcome-card">
      <h2 id="welcome-title"></h2>
      <p id="welcome-subtitle"></p>
      <div class="lang-options">
        <button id="lang-es" class="lang-option">
          <span class="lang-flag">🇪🇸</span>
          <span class="lang-name"></span>
        </button>
        <button id="lang-pt" class="lang-option">
          <span class="lang-flag">🇧🇷</span>
          <span class="lang-name"></span>
        </button>
      </div>
      <button id="btn-welcome-continue" class="btn-primary"></button>
    </div>
  </section>

  <!-- ============ PANTALLA DE INICIO ============ -->
  <section id="screen-home" class="screen">
    <div class="sky">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
      <div class="plane">✈️</div>
    </div>

    <header class="home-header">
      <p class="eyebrow" id="ui-eyebrow"></p>
      <h1>English<span class="accent">Quest</span></h1>
      <p class="tagline" id="ui-tagline"></p>
      <button id="btn-change-lang" class="btn-lang-switch"></button>
    </header>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-num" id="home-xp">0</span>
        <span class="stat-label" id="ui-stat-xp-label"></span>
      </div>
      <div class="stat">
        <span class="stat-num" id="home-stamps">0</span>
        <span class="stat-label" id="ui-stat-stamps-label"></span>
      </div>
      <div class="stat">
        <span class="stat-num" id="home-best-streak">0</span>
        <span class="stat-label" id="ui-stat-streak-label"></span>
      </div>
    </div>

    <div id="study-tabs" class="study-tabs"></div>

    <h2 class="section-title" id="ui-choose-dest"></h2>

    <div id="destinations" class="destinations">
      <!-- Las tarjetas de destino se generan con JavaScript -->
    </div>

    <button id="btn-passport" class="btn-ghost"></button>
    <button id="btn-reset" class="btn-reset"></button>
  </section>

  <!-- ============ PANTALLA DE JUEGO ============ -->
  <section id="screen-game" class="screen">
    <div class="game-top">
      <button id="btn-quit" class="btn-quit" aria-label="Salir">✕</button>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div class="streak-badge" id="streak-badge">🔥 <span id="streak-num">0</span></div>
    </div>

    <div class="game-meta">
      <span id="game-destination" class="game-destination"></span>
      <span id="game-counter" class="game-counter"></span>
    </div>

    <div class="question-card" id="question-card">
      <p class="question-type" id="question-type"></p>
      <h2 class="question-text" id="question-text"></h2>
      <div class="options" id="options"></div>
    </div>

    <div class="feedback hidden" id="feedback">
      <p class="feedback-title" id="feedback-title"></p>
      <p class="feedback-explanation" id="feedback-explanation"></p>
      <button id="btn-next" class="btn-primary">Siguiente →</button>
    </div>
  </section>

  <!-- ============ PANTALLA DE RESULTADOS ============ -->
  <section id="screen-results" class="screen">
    <div class="results-card">
      <div class="stamp-reveal" id="stamp-reveal"></div>
      <h2 id="results-title"></h2>
      <p id="results-sub"></p>
      <div class="results-stats">
        <div class="rstat"><span id="results-correct">0</span><small id="ui-results-correct-label"></small></div>
        <div class="rstat"><span id="results-xp">0</span><small id="ui-results-xp-label"></small></div>
        <div class="rstat"><span id="results-streak">0</span><small id="ui-results-streak-label"></small></div>
      </div>
      <button id="btn-retry" class="btn-ghost"></button>
      <button id="btn-home" class="btn-primary"></button>
    </div>
  </section>

  <!-- ============ PANTALLA PASAPORTE ============ -->
  <section id="screen-passport" class="screen">
    <div class="passport">
      <div class="passport-header">
        <span id="ui-passport-eyebrow"></span>
        <h2>English Quest</h2>
      </div>
      <div class="passport-grid" id="passport-grid"></div>
      <button id="btn-passport-back" class="btn-primary"></button>
    </div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
